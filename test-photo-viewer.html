<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer Test</title>
    <link rel="stylesheet" href="/MUBUGA-TSS/assets/css/photo-viewer.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .test-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s ease;
        }
        .test-image:hover {
            transform: scale(1.05);
        }
        .debug-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Photo Viewer Test Page</h1>
        <div class="debug-info">
            <h3>Debug Information:</h3>
            <p id="debug-status">Loading...</p>
            <p id="debug-images">Images found: 0</p>
            <p id="debug-viewer">PhotoViewer instance: Not loaded</p>
        </div>
        
        <h2>Test Images (Click to open in viewer)</h2>
        <div>
            <img class="photo-viewer test-image" src="https://picsum.photos/seed/test1/400/300.jpg" alt="Test Image 1">
            <img class="photo-viewer test-image" src="https://picsum.photos/seed/test2/400/300.jpg" alt="Test Image 2">
            <img class="photo-viewer test-image" src="https://picsum.photos/seed/test3/400/300.jpg" alt="Test Image 3">
        </div>
        
        <h2>Manual Test Buttons</h2>
        <button onclick="testManualOpen()">Open Single Image Manually</button>
        <button onclick="testGalleryOpen()">Open Gallery Manually</button>
        <button onclick="checkPhotoViewer()">Check PhotoViewer Status</button>
    </div>

    <script src="/MUBUGA-TSS/assets/js/photo-viewer.js"></script>
    <script>
        // Debug functions
        function updateDebugInfo() {
            const images = document.querySelectorAll('img.photo-viewer');
            document.getElementById('debug-images').textContent = `Images found: ${images.length}`;
            document.getElementById('debug-viewer').textContent = `PhotoViewer instance: ${typeof PhotoViewer !== 'undefined' ? 'Loaded' : 'Not loaded'}`;
            document.getElementById('debug-status').textContent = 'Page loaded';
        }

        function testManualOpen() {
            console.log('Testing manual open...');
            if (typeof openPhotoViewer !== 'undefined') {
                openPhotoViewer('https://picsum.photos/seed/manual/800/600.jpg');
            } else {
                alert('openPhotoViewer function not found!');
            }
        }

        function testGalleryOpen() {
            console.log('Testing gallery open...');
            if (typeof openPhotoViewer !== 'undefined') {
                const gallery = [
                    'https://picsum.photos/seed/gallery1/800/600.jpg',
                    'https://picsum.photos/seed/gallery2/800/600.jpg',
                    'https://picsum.photos/seed/gallery3/800/600.jpg'
                ];
                openPhotoViewer(gallery, 0);
            } else {
                alert('openPhotoViewer function not found!');
            }
        }

        function checkPhotoViewer() {
            console.log('Checking PhotoViewer...');
            console.log('PhotoViewer class:', typeof PhotoViewer);
            console.log('openPhotoViewer function:', typeof openPhotoViewer);
            console.log('photoViewer instance:', typeof photoViewer);
            
            const images = document.querySelectorAll('img.photo-viewer');
            console.log('Images with photo-viewer class:', images.length);
            images.forEach((img, index) => {
                console.log(`Image ${index}:`, img.src, img.onclick);
            });
        }

        // Run debug when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM Content Loaded - Running debug...');
            updateDebugInfo();
            
            // Check if PhotoViewer loaded
            setTimeout(() => {
                if (typeof PhotoViewer === 'undefined') {
                    document.getElementById('debug-status').textContent = 'ERROR: PhotoViewer not loaded!';
                    console.error('PhotoViewer class not found!');
                } else {
                    document.getElementById('debug-status').textContent = 'PhotoViewer loaded successfully!';
                    console.log('PhotoViewer loaded successfully!');
                }
                updateDebugInfo();
            }, 1000);
        });

        // Add click listeners manually for testing
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('img.photo-viewer');
            images.forEach((img, index) => {
                img.addEventListener('click', function(e) {
                    console.log('Image clicked:', index, this.src);
                    if (typeof openPhotoViewer !== 'undefined') {
                        openPhotoViewer(this.src, 0);
                    } else {
                        alert('PhotoViewer not loaded!');
                    }
                });
            });
        });
    </script>
</body>
</html>
